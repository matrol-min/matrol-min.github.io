name: Build CV (Pages + PDF, KO/EN)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) 논문/특허 카운트 자동 계산 → index.html, en.html 갱신
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Auto-count publications & patents (KO/EN)
        run: python scripts/build_publications.py

      # 2) Jekyll 빌드
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - name: Build site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      # 3) GitHub Pages 배포 준비
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # 4) PDF 생성 — 국문/영문 각각
      - name: Install Puppeteer
        run: npm install puppeteer
      - name: Generate PDFs (KO + EN)
        run: node scripts/make_pdf.js
      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: |
            cv-ko.pdf
            cv-en.pdf

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
